{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm border-0 rounded-4">
            <div class="card-body p-5 text-center">
                <i class="bi bi-shield-lock-fill text-primary mb-3" style="font-size: 3.5rem;"></i>
                <h2 class="fw-bold">Verify Your Email</h2>
                <p class="text-muted mb-4">We've sent a 6-digit OTP to your email address.</p>

                <form method="POST" action="/verify">
                    <div class="mb-4 text-start">
                        <label for="otp" class="form-label fw-medium text-muted">Enter OTP code</label>
                        <input type="text"
                            class="form-control form-control-lg text-center fw-bold fs-3 tracking-widest bg-light border-0"
                            id="otp" name="otp" placeholder="123456" maxlength="6" autocomplete="one-time-code"
                            autofocus required>
                        <div class="form-text mt-2 text-center">Code expires in 5 minutes</div>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg w-100 rounded-pill fw-medium">Verify &
                        Login</button>
                </form>

                <div class="mt-4 pt-3 border-top">
                    <p class="mb-0 text-muted small">Didn't receive code? <a href="/login"
                            class="text-primary text-decoration-none fw-semibold">Try another email</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
